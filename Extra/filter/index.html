<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        --bg-img: url(../images/pexels-bri-schneiter-28802-346529.jpg);
        /* linear-gradient(to right bottom,black,white) url(../images/pexels-bri-schneiter-28802-346529.jpg) */
        height: 97vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--bg-img);
        background-repeat: no-repeat;
        background-size: cover;
    }

    div {
        height: 400px;
        width: 400px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2rem;
        font-weight: 900;
        color: beige;
        border: 2px solid black;
        border-radius: 20px;
        border-top: 2px solid rgba(255,255, 255, 0.4);
        border-left: 2px solid rgba(255,255, 255, 0.4);
        box-shadow: 2px 2px 10px rgba(0,0, 0, 0.4);
        background-color: rgba(0,0, 255, 0.4);
        /* -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px); */
        /* filter: blur(20px); */
        filter: brightness(10%);
        filter: contrast(20%);
        filter: hue-rotate(0);
        filter: opacity(1);
        filter: drop-shadow(2px 2px 10px red);
        filter: grayscale(0%);
        filter: saturate(100%);
        filter: sepia(50%);
        /* filter: if(); */
}
</style>

<body>
    <div>
        <p>
            CSS Glassmorphisum
        </p>
    </div>
</body>

</html>
